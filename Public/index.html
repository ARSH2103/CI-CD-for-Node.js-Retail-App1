<!DOCTYPE html>
<html>
<head>
    <title>Retail App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .product {
            background: white;
            margin: 10px;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            width: 200px;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<h1>🛒 Retail Store</h1>

<div id="products"></div>

<script>
fetch('/products')
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById('products');

        data.forEach(p => {
            const div = document.createElement('div');
            div.className = 'product';
            div.innerHTML = `
                <h3>${p.name}</h3>
                <p>₹${p.price}</p>
            `;
            container.appendChild(div);
        });
    });
</script>

</body>
</html>
